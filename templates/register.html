{{ define "content" }}
<div class="text-center mb-3 mt-4">
    <a href="/" style="text-decoration: none;">
        <span style="font-weight: 900; font-size: 1.6rem; letter-spacing: -0.5px; color: var(--dark);">Строй<span style="color: var(--blue);">Контроль</span></span>
    </a>
</div>

<div class="row justify-content-center">
    <!-- Форма -->
    <div class="col-lg-4 col-md-6 mb-4 mb-lg-0">
        <div class="card shadow h-100">
            <div class="card-body p-4">
                <div class="text-center">
                    <div style="display: inline-flex; align-items: center; justify-content: center; width: 52px; height: 52px; background: #ECFDF5; border-radius: 14px; margin-bottom: 0.75rem;">
                        <i class="bi bi-person-plus" style="font-size: 1.4rem; color: var(--green);"></i>
                    </div>
                    <h3 class="mb-1" style="font-weight: 800; letter-spacing: -0.5px;">Регистрация</h3>
                    <p class="text-muted mb-3" style="font-size: 0.88rem;">Создайте аккаунт с биометрией</p>
                </div>

                <div class="mb-3">
                    <label class="form-label">Имя</label>
                    <input type="text" id="name" class="form-control" placeholder="Иванов Иван Иванович" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="ivan@company.ru" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Роль</label>
                    <select id="role" class="form-select">
                        <option value="director">Директор</option>
                        <option value="accountant">Бухгалтер</option>
                        <option value="manager">Менеджер</option>
                        <option value="engineer">Инженер</option>
                        <option value="viewer" selected>Зритель (только просмотр)</option>
                    </select>
                    <small class="text-muted">Первый пользователь автоматически становится администратором</small>
                </div>

                <button id="registerBtn" class="btn btn-primary btn-lg w-100 mt-2" disabled>
                    Зарегистрироваться
                </button>

                <p class="text-center mt-3 mb-0 text-muted" style="font-size: 0.88rem;">Уже есть аккаунт? <a href="/login" style="color: var(--blue); font-weight: 600; text-decoration: none;">Войти</a></p>
            </div>
        </div>
    </div>

    <!-- Камера -->
    <div class="col-lg-5 col-md-6">
        <div class="card shadow h-100">
            <div class="card-body p-4">
                <label class="form-label">Сканирование лица</label>
                <div class="video-container mb-3">
                    <video id="video" width="100%" autoplay muted playsinline></video>
                    <canvas id="overlay" class="video-overlay"></canvas>
                </div>

                <div id="status" class="alert alert-info">
                    <span id="statusText">Загрузка моделей распознавания...</span>
                </div>
            </div>
        </div>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/dist/face-api.js"></script>
<script src="/static/js/face-auth.js"></script>
<script>
    initFaceAuth('register');
</script>
{{ end }}

{{ template "layout" . }}
