{{ define "content" }}
<div class="row justify-content-center mt-5">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="text-center mb-4"><i class="bi bi-person-plus"></i> Регистрация</h2>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Имя</label>
                            <input type="text" id="name" class="form-control" placeholder="Иванов Иван Иванович" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="ivan@company.ru" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Роль</label>
                            <select id="role" class="form-select">
                                <option value="director">Директор</option>
                                <option value="accountant">Бухгалтер</option>
                                <option value="manager">Менеджер</option>
                                <option value="engineer">Инженер</option>
                                <option value="viewer" selected>Зритель (только просмотр)</option>
                            </select>
                            <small class="text-muted">Первый пользователь автоматически становится администратором</small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Сканирование лица</label>
                        <div class="video-container mb-2">
                            <video id="video" width="100%" autoplay muted playsinline></video>
                            <canvas id="overlay" class="video-overlay"></canvas>
                        </div>
                        <div id="status" class="alert alert-info">
                            <span id="statusText">Загрузка моделей распознавания...</span>
                        </div>
                    </div>
                </div>

                <button id="registerBtn" class="btn btn-success btn-lg w-100 mt-3" disabled>
                    <i class="bi bi-person-check"></i> Зарегистрироваться
                </button>

                <hr>
                <p class="text-center mb-0">Уже есть аккаунт? <a href="/login">Войти</a></p>
            </div>
        </div>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/dist/face-api.js"></script>
<script src="/static/js/face-auth.js"></script>
<script>
    initFaceAuth('register');
</script>
{{ end }}

{{ template "layout" . }}
