{{ define "content" }}
<div class="row justify-content-center" style="min-height: 85vh; align-items: center;">
    <div class="col-lg-10">
        <div class="row align-items-center">
            <!-- Левая часть — текст и кнопки -->
            <div class="col-md-5 mb-4 mb-md-0">
                <h1 style="font-weight: 900; font-size: 2.8rem; letter-spacing: -1.5px; line-height: 1.1; color: var(--dark); margin-bottom: 2rem;">
                    Строй<span style="color: var(--blue);">Контроль</span>
                </h1>

                <div class="d-flex gap-3 flex-wrap">
                    <a href="/login" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Войти
                    </a>
                    <a href="/register" class="btn btn-outline-primary btn-lg">
                        <i class="bi bi-person-plus"></i> Регистрация
                    </a>
                </div>
            </div>

            <!-- Правая часть — иллюстрация -->
            <div class="col-md-7">
                <img src="/static/img/hero-buildings.svg" alt="Строительство" class="hero-illustration">
            </div>
        </div>

        <!-- Фичи -->
        <div class="row g-3 mt-4">
            <div class="col-6 col-md-3">
                <div class="feature-card">
                    <div class="feature-icon blue"><i class="bi bi-folder"></i></div>
                    <div class="feature-title">Проекты</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="feature-card">
                    <div class="feature-icon green"><i class="bi bi-calculator"></i></div>
                    <div class="feature-title">Сметы</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="feature-card">
                    <div class="feature-icon orange"><i class="bi bi-file-earmark-text"></i></div>
                    <div class="feature-title">Документы</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="feature-card">
                    <div class="feature-icon dark"><i class="bi bi-people"></i></div>
                    <div class="feature-title">Команда</div>
                </div>
            </div>
        </div>
    </div>
</div>
{{ end }}

{{ template "layout" . }}
